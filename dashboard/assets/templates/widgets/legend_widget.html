<!-- Map Legend Widget Template -->
<div class="legend-widget">
    <div class="legend-header">
        <h4>Map Legend</h4>
        <button class="toggle-legend" aria-label="Toggle legend visibility">
            <img src="/assets/images/icons/info_svg.svg" alt="Toggle legend">
        </button>
    </div>
    <div class="legend-content">
        <div class="legend-section">
            <h5>Project Types</h5>
            <div class="legend-item">
                <img src="/assets/images/icons/solar_panel_svg.svg" alt="Solar project">
                <span>Solar Projects</span>
            </div>
            <div class="legend-item">
                <img src="/assets/images/icons/battery_svg.svg" alt="Storage">
                <span>Storage Projects</span>
            </div>
        </div>
        <div class="legend-section">
            <h5>Capacity Range</h5>
            <div class="capacity-scale">
                <span class="small">< 100 MW</span>
                <span class="medium">100-500 MW</span>
                <span class="large">> 500 MW</span>
            </div>
        </div>
    </div>
</div>
