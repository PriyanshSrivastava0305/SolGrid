<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Battery Body -->
  <rect x="10" y="30" width="80" height="50" rx="5" ry="5" fill="#6c757d" />
  <rect x="15" y="35" width="70" height="40" rx="3" ry="3" fill="#495057" />
  
  <!-- Battery Terminal -->
  <rect x="40" y="20" width="20" height="10" rx="2" ry="2" fill="#343a40" />
  
  <!-- Battery Indicator Lights -->
  <g>
    <!-- Level 1 (red) -->
    <rect x="20" y="42" width="10" height="26" rx="2" ry="2" fill="#dc3545" />
    
    <!-- Level 2 (yellow) -->
    <rect x="35" y="42" width="10" height="26" rx="2" ry="2" fill="#ffc107" />
    
    <!-- Level 3 (light green) -->
    <rect x="50" y="42" width="10" height="26" rx="2" ry="2" fill="#8bc34a" />
    
    <!-- Level 4 (green) -->
    <rect x="65" y="42" width="10" height="26" rx="2" ry="2" fill="#28a745" />
  </g>
  
  <!-- Lightning Bolt Symbol -->
  <path d="M40,85 L55,85 L50,95 L65,95 L50,115 L45,105 L35,105 Z" 
        fill="#ffb703" transform="translate(20, -55) scale(0.6)" />
        
  <!-- Plus/Minus Terminals -->
  <text x="20" y="80" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="#fff">+</text>
  <text x="75" y="80" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="#fff">-</text>
</svg>